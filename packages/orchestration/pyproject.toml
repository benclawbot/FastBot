[project]
name = "fastbot-orchestration"
version = "0.1.0"
description = "FastBot Agent Orchestration using CrewAI Flows"
requires-python = ">=3.11"
dependencies = [
    "crewai>=1.9.0",
    "pydantic>=2.0.0",
    "sqlalchemy>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.pip]
# Security fixes - ensure pip is updated and install with security fixes
constraints = [
    "pip>=21.0",
    "urllib3>=1.26.4",
    "requests>=2.31.0",
    "cryptography>=41.0.0",
]
